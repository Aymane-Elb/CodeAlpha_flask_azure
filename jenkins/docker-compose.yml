services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-controller
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - jenkins-network

  agent1:
    image: jenkins/inbound-agent:latest
    container_name: jenkins-agent1
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent1
      - JENKINS_SECRET=${JENKINS_AGENT1_SECRET}
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    depends_on:
      - jenkins
    networks:
      - jenkins-network

  agent2:
    image: jenkins/inbound-agent:latest
    container_name: jenkins-agent2
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent2
      - JENKINS_SECRET=${JENKINS_AGENT2_SECRET}
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    depends_on:
      - jenkins
    networks:
      - jenkins-network

volumes:
  jenkins_home:

networks:
  jenkins-network:
    driver: bridge
